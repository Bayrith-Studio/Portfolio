<!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="description" content="Survey Form">
      <meta name="author" content="Bayrith Studio">
      <title>Survey Form</title>
      <link rel="stylesheet" href="styles.css">
      <link rel="icon" href="/Images/Logo.png" type="image/png" class="logo">
    </head>
    <body>
      <div class="form">
        <h1 id="title">Survey Form</h1>
        <p id="description" >Thank you for your patience!</p>
        <form id="survey-form">
          <fieldset>
            <label for="name" id="name-label">Name:
              <input id="name" type="text" placeholder="Your Name" required>
            </label>
            <label for="email" id="email-label">Email:
              <input id="email" type="email" placeholder="example@gmail.com" required>    
            </label>
            <label for="number" id="number-label">Contact #:
              <input id="number" type="number" placeholder="09##-###-####" pattern="[0-9]{13}" min="9" max="13" required>
            </label>
          </fieldset>
          <fieldset>
            <legend>Gender:</legend>
            <label for="male"><input id="male" type="radio" name="gender" class="inline" value="male">Male</label>
            <label for="female"><input id="female" type="radio" name="gender" class="inline" value="female">Female</label>
          </fieldset>
          <fieldset>
            <label>Marital Status:
              <select id="dropdown">
                <option>(select one)</option>
               <option>Single</option>
                <option>Married</option>
                <option>Widow</option>
                <option>Divorced</option>
              </select>
            </label>
          </fieldset>
          <fieldset>
            <legend>Employment Status:</legend>
            <label for="employed">
              <input id="employed" type="checkbox" value="employed" class="inline">Employed
            </label>
            <label for="employed">
              <input id="unemployed" type="checkbox" value="unemployed" class="inline">Unemployed
            </label>
            <label>If employed:
              <textarea placeholder="Job Description..."></textarea>
            </label>
          </fieldset>
          <input type="submit" value="Submit" id="submit" >   
        </form>
      </div>
      <script src="script.js"></script>
    </body>
  </html>
